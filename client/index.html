<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Claude AI 助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="header">
            <h2>Claude AI 助手</h2>
            <div>
                <button id="undo-btn" title="撤销上一步改动" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
                </button>
                <button id="clear-btn" title="清空对话" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                </button>
                <button id="settings-btn" title="设置" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
        </div>

        <div id="settings-panel" class="hidden">
            <label>API 地址：</label>
            <input type="text" id="api-endpoint-input" placeholder="https://api.anthropic.com">
            <label>API 密钥：</label>
            <input type="password" id="api-key-input" placeholder="sk-ant-...">
            <label>模型：</label>
            <select id="model-select">
                <option value="claude-opus-4-7">Claude Opus 4.7</option>
                <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
                <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5</option>
                <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                <option value="claude-opus-4-20250514">Claude Opus 4</option>
            </select>
            <button id="save-key-btn">保存</button>
        </div>

        <div id="chat-history">
            <div class="welcome">
                <h3>Claude AI 助手</h3>
                <p>在 After Effects 中用自然语言创建动画</p>
                <p style="font-size: 11px; color: #555; margin-top: 8px;">请先点击右上角 ⚙ 设置 API 密钥</p>
                <div class="presets">
                    <button class="preset-btn" data-prompt="创建一个文字飞入动画，从左侧滑入并带有弹性效果">文字飞入</button>
                    <button class="preset-btn" data-prompt="给选中图层添加弹性缩放动画，从0缩放到100%带回弹">弹性缩放</button>
                    <button class="preset-btn" data-prompt="创建一个圆形扩展转场效果">圆形转场</button>
                    <button class="preset-btn" data-prompt="给选中图层添加抖动效果和运动模糊">抖动效果</button>
                    <button class="preset-btn" data-prompt="创建一个彩色粒子爆炸效果">粒子爆炸</button>
                    <button class="preset-btn" data-prompt="创建一个数据柱状图增长动画">柱状图动画</button>
                </div>
            </div>
        </div>

        <div id="code-preview" class="hidden">
            <div class="code-header">
                <span>生成的代码：</span>
                <button id="execute-btn">&#x25B6; 执行</button>
                <button id="copy-btn">复制</button>
                <button id="dismiss-btn">取消</button>
            </div>
            <pre><code id="code-content"></code></pre>
        </div>

        <div id="image-preview-bar" class="hidden">
            <div id="image-thumbnails"></div>
            <button id="clear-images-btn" title="清除图片">&#x2715;</button>
        </div>

        <div id="input-area">
            <input type="file" id="image-input" accept="image/*,video/*" multiple style="display:none">
            <button id="upload-btn" title="上传图片或视频（视频会自动抽取6帧）" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.93 8.78l-8.49 8.49a2 2 0 1 1-2.83-2.83l6.36-6.36"/></svg>
            </button>
            <textarea id="user-input" placeholder="描述你想要的动画效果，可粘贴或上传图片..." rows="1"></textarea>
            <button id="send-btn">发送</button>
        </div>
    </div>

    <script>
    window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML = '<div style="color:red;padding:20px;font-size:12px;">' +
            '<h3>Load Error</h3><p>' + msg + '</p><p>File: ' + url + ':' + line + '</p></div>';
        return true;
    };
    </script>
    <script src="js/CSInterface.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/ae-bridge.js"></script>
    <script src="js/claude-api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
